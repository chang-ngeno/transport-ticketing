spring:
  application:
    name: transport-ticketing
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ticketdb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${JPA_SHOW_SQL:false}
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  threads:
    virtual:
      enabled: true
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false
  devtools:
    restart:
      enabled: ${DEVTOOLS_ENABLED:false}
      additional-paths: src/main/java
      exclude: static/**,templates/**
    livereload:
      enabled: ${DEVTOOLS_ENABLED:false}
  web:
    resources:
      static-locations: classpath:/static/

resilience4j:
  ratelimiter:
    instances:
      booking:
        limit-for-period: 100
        limit-refresh-period: 60s
        timeout-duration: 0ms

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

encryption:
  master-password: ${ENCRYPTION_MASTER_PASSWORD}

africastalking:
  username: ${AT_USERNAME:sandbox}
  api-key: ${AT_API_KEY:}

mpesa:
  callback-url: ${MPESA_CALLBACK_URL:http://localhost:8080/api/mpesa/callback}

superadmin:
  username: ${SUPERADMIN_USERNAME:superadmin}
  password: ${SUPERADMIN_PASSWORD:superadmin123}

logging:
  level:
    ke.co.masajr.transport.service: DEBUG
    ke.co.masajr.transport.controller: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
