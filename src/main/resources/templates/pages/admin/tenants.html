<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Admin • Tenants')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">

    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Administration</div>
        <h1>Tenants</h1>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-tenant-modal')">+ New Tenant</button>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>ID</th><th>Name</th><th>Shortcode</th><th>Created</th><th>Actions</th></tr>
          </thead>
          <tbody id="tenants-tbody">
            <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<!-- Create Modal -->
<div id="create-tenant-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>New Tenant</h2>
      <button class="modal-close" onclick="closeModal('create-tenant-modal')">✕</button>
    </div>
    <form id="create-tenant-form">
      <div class="form-group">
        <label class="form-label">Tenant Name</label>
        <input class="form-control" type="text" name="name" placeholder="e.g. Nairobi Express" required/>
      </div>
      <div class="form-group">
        <label class="form-label">M-PESA Shortcode</label>
        <input class="form-control" type="text" name="mpesaShortcode" placeholder="174379" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Consumer Key</label>
        <input class="form-control" type="password" name="consumerKey" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Consumer Secret</label>
        <input class="form-control" type="password" name="consumerSecret" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Passkey</label>
        <input class="form-control" type="password" name="passkey" placeholder="••••••••" required/>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('create-tenant-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Tenant</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-tenant-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit Tenant</h2>
      <button class="modal-close" onclick="closeModal('edit-tenant-modal')">✕</button>
    </div>
    <form id="edit-tenant-form">
      <input type="hidden" id="edit-tenant-id"/>
      <div class="form-group">
        <label class="form-label">Tenant Name</label>
        <input class="form-control" type="text" id="edit-tenant-name" required/>
      </div>
      <div class="form-group">
        <label class="form-label">M-PESA Shortcode</label>
        <input class="form-control" type="text" id="edit-tenant-shortcode" required/>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('edit-tenant-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="delete-tenant-modal" class="modal-backdrop">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h2>Delete Tenant</h2>
      <button class="modal-close" onclick="closeModal('delete-tenant-modal')">✕</button>
    </div>
    <p style="color:var(--text-muted);font-size:0.9rem;margin-bottom:1.5rem;">
      Are you sure you want to delete <strong id="delete-tenant-name" style="color:var(--text);"></strong>?
      This will remove all associated data and cannot be undone.
    </p>
    <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
      <button type="button" class="btn btn-ghost" onclick="closeModal('delete-tenant-modal')">Cancel</button>
      <button type="button" class="btn btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
  async function loadTenants() {
    const data = await api('GET', '/admin/tenants');
    if (!Array.isArray(data)) {
      setTableBody('tenants-tbody', '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">Failed to load tenants</td></tr>');
      return;
    }
    if (!data.length) {
      setTableBody('tenants-tbody', '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">No tenants found</td></tr>');
      return;
    }
    setTableBody('tenants-tbody', data.map(t => {
      const date = t.createdAt ? new Date(t.createdAt).toLocaleDateString('en-KE', {day:'2-digit',month:'short',year:'numeric'}) : '–';
      return `<tr>
        <td class="mono" style="font-size:0.8rem;">${t.id}</td>
        <td style="font-weight:500;">${t.name}</td>
        <td class="mono" style="color:var(--accent);">${t.mpesaShortcode}</td>
        <td class="mono" style="font-size:0.75rem;">${date}</td>
        <td style="display:flex;gap:0.5rem;">
          <button class="btn btn-ghost btn-sm" onclick="openEditModal(${t.id}, '${t.name.replace(/'/g,"\\'")}', '${t.mpesaShortcode}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${t.id}, '${t.name.replace(/'/g,"\\'")}')">Delete</button>
        </td>
      </tr>`;
    }).join(''));
  }

  // Create
  document.getElementById('create-tenant-form').addEventListener('submit', async e => {
    e.preventDefault();
    const form = e.target;
    const btn  = form.querySelector('[type=submit]');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const result = await api('POST', '/admin/tenants', {
        name:           form.name.value,
        mpesaShortcode: form.mpesaShortcode.value,
        consumerKey:    form.consumerKey.value,
        consumerSecret: form.consumerSecret.value,
        passkey:        form.passkey.value
      });
      if (result?.id) {
        closeModal('create-tenant-modal');
        form.reset();
        showFlash(`Tenant '${result.name}' created.`, 'success');
        loadTenants();
      } else {
        throw new Error(result?.message || 'Failed to create tenant');
      }
    } catch (err) { showFlash(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Create Tenant'; }
  });

  // Edit
  function openEditModal(id, name, shortcode) {
    document.getElementById('edit-tenant-id').value        = id;
    document.getElementById('edit-tenant-name').value      = name;
    document.getElementById('edit-tenant-shortcode').value = shortcode;
    openModal('edit-tenant-modal');
  }

  document.getElementById('edit-tenant-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('[type=submit]');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const id = document.getElementById('edit-tenant-id').value;
      const result = await api('PUT', `/admin/tenants/${id}`, {
        name:           document.getElementById('edit-tenant-name').value,
        mpesaShortcode: document.getElementById('edit-tenant-shortcode').value
      });
      if (result?.id) {
        closeModal('edit-tenant-modal');
        showFlash(`Tenant '${result.name}' updated.`, 'success');
        loadTenants();
      } else {
        throw new Error(result?.message || 'Failed to update tenant');
      }
    } catch (err) { showFlash(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
  });

  // Delete
  let pendingDeleteId = null;

  function openDeleteModal(id, name) {
    pendingDeleteId = id;
    document.getElementById('delete-tenant-name').textContent = name;
    openModal('delete-tenant-modal');
  }

  document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    const btn = document.getElementById('confirm-delete-btn');
    btn.disabled = true; btn.textContent = 'Deleting…';
    try {
      await api('DELETE', `/admin/tenants/${pendingDeleteId}`);
      closeModal('delete-tenant-modal');
      showFlash('Tenant deleted.', 'success');
      pendingDeleteId = null;
      loadTenants();
    } catch (err) { showFlash(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Delete'; }
  });

  loadTenants();
</script>
</body>
</html>
