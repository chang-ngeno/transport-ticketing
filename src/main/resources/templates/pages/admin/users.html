<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Admin • Users')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">

    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Administration</div>
        <h1>Users</h1>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-user-modal')">+ New Tenant Admin</button>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <!-- Tenant Admins (editable) -->
    <div style="margin-bottom:0.75rem;">
      <div style="font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:0.75rem;">Tenant Admins — editable</div>
    </div>
    <div class="card" style="margin-bottom:2rem;">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Username</th><th>Tenant</th><th>Created</th><th>Actions</th></tr>
          </thead>
          <tbody id="tenant-admins-tbody">
            <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- All other users (view-only) -->
    <div style="margin-bottom:0.75rem;">
      <div style="font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.75rem;">All Other Users — view only</div>
    </div>
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Username</th><th>Role</th><th>Tenant ID</th><th>Stage ID</th><th>Created</th></tr>
          </thead>
          <tbody id="other-users-tbody">
            <tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</main>

<!-- Create Tenant Admin Modal -->
<div id="create-user-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>New Tenant Admin</h2>
      <button class="modal-close" onclick="closeModal('create-user-modal')">✕</button>
    </div>
    <form id="create-admin-user-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="jane.doe" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Tenant</label>
        <select class="form-control" name="tenantId" id="admin-user-tenant-select">
          <option value="">Select tenant…</option>
        </select>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('create-user-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create</button>
      </div>
    </form>
  </div>
</div>

<!-- Edit Tenant Admin Modal -->
<div id="edit-user-modal" class="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit Tenant Admin</h2>
      <button class="modal-close" onclick="closeModal('edit-user-modal')">✕</button>
    </div>
    <form id="edit-admin-user-form">
      <input type="hidden" id="edit-user-id"/>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" id="edit-username" placeholder="jane.doe" required/>
      </div>
      <div class="form-group">
        <label class="form-label">New Password <span style="color:var(--text-muted);font-size:0.75rem;">(leave blank to keep current)</span></label>
        <input class="form-control" type="password" id="edit-password" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tenant</label>
        <select class="form-control" id="edit-tenant-select">
          <option value="">Select tenant…</option>
        </select>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('edit-user-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
  let tenantsCache = [];

  async function loadAdminUsers() {
    const [users, tenants] = await Promise.all([
      api('GET', '/admin/users'),
      api('GET', '/admin/tenants')
    ]);
    if (!Array.isArray(users) || !Array.isArray(tenants)) return;
    tenantsCache = tenants;

    // populate tenant selects
    const tenantOpts = '<option value="">Select tenant…</option>' +
      tenants.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    document.getElementById('admin-user-tenant-select').innerHTML = tenantOpts;
    document.getElementById('edit-tenant-select').innerHTML = tenantOpts;

    const tenantMap = Object.fromEntries(tenants.map(t => [t.id, t.name]));
    const tenantAdmins = users.filter(u => u.role === 'TENANT_ADMIN');
    const others       = users.filter(u => u.role !== 'TENANT_ADMIN');

    // Tenant admins table
    if (!tenantAdmins.length) {
      setTableBody('tenant-admins-tbody', '<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted);">No tenant admins found</td></tr>');
    } else {
      setTableBody('tenant-admins-tbody', tenantAdmins.map(u => {
        const date   = u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-KE', {day:'2-digit',month:'short',year:'numeric'}) : '–';
        const tenant = u.tenantId ? (tenantMap[u.tenantId] || `#${u.tenantId}`) : '–';
        return `<tr>
          <td>${u.username}</td>
          <td style="color:var(--text-muted);font-size:0.85rem;">${tenant}</td>
          <td class="mono" style="font-size:0.75rem;">${date}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="openEditModal(${u.id}, '${u.username}', ${u.tenantId || 'null'})">Edit</button></td>
        </tr>`;
      }).join(''));
    }

    // Other users table (view only)
    if (!others.length) {
      setTableBody('other-users-tbody', '<tr><td colspan="5" style="text-align:center;padding:2rem;color:var(--text-muted);">No other users found</td></tr>');
    } else {
      setTableBody('other-users-tbody', others.map(u => {
        const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString('en-KE', {day:'2-digit',month:'short',year:'numeric'}) : '–';
        return `<tr>
          <td>${u.username}</td>
          <td><span class="badge badge-pending" style="font-size:0.6rem;">${u.role}</span></td>
          <td class="mono" style="font-size:0.75rem;">${u.tenantId || '–'}</td>
          <td class="mono" style="font-size:0.75rem;">${u.stageId || '–'}</td>
          <td class="mono" style="font-size:0.75rem;">${date}</td>
        </tr>`;
      }).join(''));
    }
  }

  function openEditModal(id, username, tenantId) {
    document.getElementById('edit-user-id').value    = id;
    document.getElementById('edit-username').value   = username;
    document.getElementById('edit-password').value   = '';
    document.getElementById('edit-tenant-select').value = tenantId || '';
    openModal('edit-user-modal');
  }

  // Create form
  const createForm = document.getElementById('create-admin-user-form');
  createForm.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = createForm.querySelector('[type=submit]');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const tenantId = createForm.tenantId.value;
      const result = await api('POST', '/tenant/users', {
        username: createForm.username.value,
        password: createForm.password.value,
        role:     'TENANT_ADMIN',
        tenantId: tenantId ? Number(tenantId) : null
      });
      if (result?.id) {
        closeModal('create-user-modal');
        createForm.reset();
        showFlash(`User '${result.username}' created.`, 'success');
        loadAdminUsers();
      } else {
        throw new Error(result?.message || 'Failed to create user');
      }
    } catch (err) { showFlash(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Create'; }
  });

  // Edit form
  const editForm = document.getElementById('edit-admin-user-form');
  editForm.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = editForm.querySelector('[type=submit]');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      const id       = document.getElementById('edit-user-id').value;
      const username = document.getElementById('edit-username').value;
      const password = document.getElementById('edit-password').value;
      const tenantId = document.getElementById('edit-tenant-select').value;
      const body = { username };
      if (password) body.password = password;
      if (tenantId) body.tenantId = Number(tenantId);
      const result = await api('PUT', `/admin/users/${id}`, body);
      if (result?.id) {
        closeModal('edit-user-modal');
        showFlash(`User '${result.username}' updated.`, 'success');
        loadAdminUsers();
      } else {
        throw new Error(result?.message || 'Failed to update user');
      }
    } catch (err) { showFlash(err.message, 'error'); }
    finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
  });

  loadAdminUsers();
</script>
</body>
</html>
