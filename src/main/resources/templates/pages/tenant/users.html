<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Tenant • Users')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Tenant Management</div>
        <h1>Users</h1>
      </div>
      <button class="btn btn-primary" onclick="openModal('invite-user-modal')"
              sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN')">+ Invite User</button>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Username</th><th>Role</th><th>Stage ID</th><th>Created</th></tr>
          </thead>
          <tbody id="users-tbody">
            <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="invite-user-modal" class="modal-backdrop"
     sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN')">
  <div class="modal">
    <div class="modal-header">
      <h2>Invite User</h2>
      <button class="modal-close" onclick="closeModal('invite-user-modal')">✕</button>
    </div>
    <form id="create-tenant-user-form">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-control" type="text" name="username" placeholder="jane.doe" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-control" name="role" required>
          <option value="">Select role…</option>
          <option value="TENANT_ADMIN">Tenant Admin</option>
          <option value="STAGE_HEAD">Stage Head</option>
          <option value="STAGE_ATTENDANT">Stage Attendant</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Stage</label>
        <select class="form-control" name="stageId" id="user-stage-select">
          <option value="">None</option>
        </select>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('invite-user-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create User</button>
      </div>
    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
