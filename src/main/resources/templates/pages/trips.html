<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Trips')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Schedules</div>
        <h1>Trips</h1>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-trip-modal')"
              sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN','STAGE_HEAD')">+ New Trip</button>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Start Time</th><th>To</th><th>Route</th>
              <th>Seats</th><th>Base Price</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="trips-tbody">
            <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="create-trip-modal" class="modal-backdrop"
     sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN','STAGE_HEAD')">
  <div class="modal">
    <div class="modal-header">
      <h2>New Trip</h2>
      <button class="modal-close" onclick="closeModal('create-trip-modal')">✕</button>
    </div>
    <form id="create-trip-form">
      <div class="form-group" sec:authorize="hasRole('SUPER_ADMIN')">
        <label class="form-label">Tenant</label>
        <select class="form-control" name="tenantId" id="trip-tenant-select">
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">From Stage</label>
        <select class="form-control" name="fromStageId" id="trip-from-stage" required>
          <option value="">Loading…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Vehicle</label>
        <select class="form-control" name="vehicleId" id="trip-vehicle-select" required>
          <option value="">Loading vehicles…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Destination</label>
        <input class="form-control" type="text" name="toDestination" placeholder="e.g. Nairobi CBD" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Route</label>
        <input class="form-control" type="text" name="route" placeholder="e.g. via Thika Rd"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label class="form-label">Trip Start Time</label>
          <input class="form-control" type="datetime-local" name="tripStartTime"/>
        </div>
        <div class="form-group">
          <label class="form-label">Total Seats</label>
          <input class="form-control" type="number" name="totalSeats" min="1" placeholder="Auto-populated" required readonly/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Base Price (KES)</label>
        <input class="form-control" type="number" name="basePrice" step="0.01" placeholder="150.00" required/>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('create-trip-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Trip</button>
      </div>
    </form>
  </div>
</div>

<div id="manifest-modal" class="modal-backdrop">
  <div class="modal" style="max-width: 650px;">
    <div class="modal-header">
      <h2>Trip Manifest & Booking Summary</h2>
      <button class="modal-close" onclick="closeModal('manifest-modal')">✕</button>
    </div>
    <div id="manifest-content">
      <p style="text-align:center;padding:2rem;color:var(--text-muted);">Loading manifest…</p>
    </div>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script sec:authorize="hasRole('SUPER_ADMIN')">
  api('GET', '/admin/tenants').then(tenants => {
    const sel = document.getElementById('trip-tenant-select');
    if (sel && Array.isArray(tenants))
      sel.innerHTML = '<option value="">Select tenant…</option>' +
        tenants.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  });
</script>
</body>
</html>
