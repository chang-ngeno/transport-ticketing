<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Vehicles')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Fleet</div>
        <h1>Vehicles</h1>
      </div>
      <button class="btn btn-primary" onclick="openModal('create-vehicle-modal')"
              sec:authorize="hasAnyRole('STAGE_HEAD','TENANT_ADMIN','SUPER_ADMIN')">+ Register Vehicle</button>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Registration</th><th>Capacity</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="vehicles-tbody">
            <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="create-vehicle-modal" class="modal-backdrop"
     sec:authorize="hasAnyRole('STAGE_HEAD','TENANT_ADMIN','SUPER_ADMIN')">
  <div class="modal">
    <div class="modal-header">
      <h2>Register Vehicle</h2>
      <button class="modal-close" onclick="closeModal('create-vehicle-modal')">✕</button>
    </div>
    <form id="create-vehicle-form">
      <div class="form-group">
        <label class="form-label">Registration Number</label>
        <input class="form-control" type="text" name="registrationNumber"
               placeholder="e.g. KDA 123A" style="text-transform:uppercase" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Passenger Capacity</label>
        <input class="form-control" type="number" name="capacity" min="1" max="60" placeholder="14" required/>
      </div>
      <div class="form-group" sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN')">
        <label class="form-label">Stage</label>
        <select class="form-control" name="stageId" id="vehicle-stage-select" required>
          <option value="">Select stage…</option>
        </select>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('create-vehicle-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Register</button>
      </div>
    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script sec:authorize="hasAnyRole('TENANT_ADMIN','SUPER_ADMIN')">
  api('GET', '/tenant/stages').then(stages => {
    const sel = document.getElementById('vehicle-stage-select');
    if (sel && Array.isArray(stages))
      sel.innerHTML = '<option value="">My assigned stage</option>' +
        stages.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  });
</script>
</body>
</html>
