<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Tickets')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Bookings</div>
        <h1>Tickets</h1>
      </div>
      <a th:href="@{/tickets/book}" class="btn btn-primary">+ New Booking</a>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.5rem;">
      <input class="form-control" type="text" id="ticket-search"
             placeholder="Search ticket ID or phone…" style="max-width:280px;"/>
      <select class="form-control" id="ticket-status" style="max-width:160px;">
        <option value="">All statuses</option>
        <option value="PAID">Paid</option>
        <option value="PENDING">Pending</option>
        <option value="FAILED">Failed</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Ticket ID</th><th>Phone</th><th>Trip #</th>
              <th>Amount</th><th>Status</th><th>Booked At</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="tickets-tbody">
            <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-muted);">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div id="receipt-modal" class="modal-backdrop">
  <div class="modal" style="max-width: 420px; font-family: var(--font-sans);">
    <div class="modal-header no-print">
      <h2>Ticket Receipt</h2>
      <button class="modal-close" onclick="closeModal('receipt-modal')">✕</button>
    </div>
    <div id="receipt-content">
      <p style="text-align:center;padding:2rem;color:var(--text-muted);">Loading receipt…</p>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:1.5rem;gap:0.5rem;" class="no-print">
      <button class="btn btn-ghost" onclick="closeModal('receipt-modal')">Close</button>
      <button class="btn btn-primary" onclick="window.print()">Print Receipt</button>
    </div>
  </div>
</div>

<style>
@media print {
  body * { visibility: hidden; }
  #receipt-modal, #receipt-modal * { visibility: visible; }
  #receipt-modal { position: absolute; left: 0; top: 0; width: 100%; border: none; box-shadow: none; background: white; margin: 0; padding: 0; }
  .no-print { display: none !important; }
}
</style>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
