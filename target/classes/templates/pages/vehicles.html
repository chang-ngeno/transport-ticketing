<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: layout('Vehicles — TransitFlow', ~{::body-content})}">
</head>
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="page-header-left">
    <h1>Vehicles</h1>
    <p>Stage fleet management</p>
  </div>
  <button class="btn btn-primary" onclick="Modal.open('create-vehicle-modal')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Register Vehicle
  </button>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Registration</th><th>Capacity</th><th>Status</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="vehicles-tbody">
        <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text3)">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Create Vehicle Modal -->
<div class="modal-overlay" id="create-vehicle-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Register Vehicle</span>
      <button class="modal-close" onclick="Modal.close('create-vehicle-modal')">×</button>
    </div>
    <div class="modal-body">
      <form id="create-vehicle-form" class="form-grid">
        <div class="form-group">
          <label class="form-label">Registration Number</label>
          <input class="form-input" type="text" name="registrationNumber"
                 placeholder="e.g. KDA 123A" style="text-transform:uppercase" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Passenger Capacity</label>
          <input class="form-input" type="number" name="capacity" min="1" max="60" placeholder="14" required/>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('create-vehicle-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="document.getElementById('create-vehicle-form').requestSubmit()">Register</button>
    </div>
  </div>
</div>

</th:block>
</body>
</html>
