<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: layout('Bookings — TransitFlow', ~{::body-content})}">
</head>
<body>
<th:block th:fragment="body-content">

<div class="page-header">
  <div class="page-header-left">
    <h1>Bookings</h1>
    <p>All ticket bookings across trips</p>
  </div>
  <a href="/tickets/book" class="btn btn-primary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Book Ticket
  </a>
</div>

<div class="card">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Ticket ID</th>
          <th>Phone</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Checkout ID</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="bookings-tbody">
        <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text3)">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

</th:block>
</body>
</html>
