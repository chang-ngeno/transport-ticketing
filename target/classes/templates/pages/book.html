<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Book Ticket')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper" style="max-width:720px;">
    <div style="margin-bottom:2rem;">
      <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">New Booking</div>
      <h1>Book a Ticket</h1>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <!-- Ticket result -->
    <div th:if="${booking}" class="ticket" style="margin-bottom:2rem;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;">
        <div>
          <div style="font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);">Ticket ID</div>
          <div class="ticket-id" th:text="${booking.ticketId}">TKT-XXXX</div>
        </div>
        <span th:class="'badge badge-' + ${booking.status.toLowerCase()}" th:text="${booking.status}">PENDING</span>
      </div>
      <hr class="ticket-divider"/>
      <div class="ticket-row">
        <span class="ticket-row-label">Phone</span>
        <span class="ticket-row-value" th:text="${booking.phoneNumber}">–</span>
      </div>
      <div class="ticket-row">
        <span class="ticket-row-label">Amount</span>
        <span class="ticket-row-value mono"
              th:text="'KES ' + ${#numbers.formatDecimal(booking.pricePaid,1,'COMMA',0,'POINT')}">–</span>
      </div>
      <div class="ticket-row">
        <span class="ticket-row-label">Booked at</span>
        <span class="ticket-row-value mono"
              th:text="${#temporals.format(booking.createdAt,'dd MMM yyyy HH:mm')}">–</span>
      </div>
      <hr class="ticket-divider"/>
      <p style="font-size:0.8rem;color:var(--text-muted);text-align:center;">
        Check your phone for the M-PESA STK push prompt to complete payment.
      </p>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Booking Details</span></div>

      <form id="book-form">
        <div class="form-group">
          <label class="form-label">Select Trip</label>
          <select class="form-control" name="tripId" id="tripSelect" required>
            <option value="">Choose a trip…</option>
            <option th:each="t : ${trips}"
                    th:value="${t.id}"
                    th:selected="${selectedTripId != null and selectedTripId == t.id}"
                    th:text="${#temporals.format(t.departureTime,'dd MMM HH:mm')} + ' → ' + ${t.toDestination} + ' | KES ' + ${#numbers.formatDecimal(t.pricePerSeat,1,'COMMA',0,'POINT')} + ' (' + ${t.totalSeats - t.bookedSeats} + ' seats)'">
              Trip
            </option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Passenger Phone Number</label>
          <input class="form-control" type="tel" name="phoneNumber" id="phoneNumber"
                 placeholder="+254712345678" pattern="^\+?[0-9]{9,15}$" required/>
          <div class="form-hint">The M-PESA STK push will be sent to this number.</div>
        </div>
        <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
          <a th:href="@{/tickets}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary btn-lg">Confirm &amp; Pay</button>
        </div>
      </form>
    </div>
  </div>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
