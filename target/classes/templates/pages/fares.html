<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Fare Management')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper" style="max-width:800px;">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Dynamic Pricing</div>
        <h1>Fare Windows</h1>
        <p style="color:var(--text-muted);font-size:0.875rem;margin-top:0.3rem;"
           th:text="'Trip: ' + ${trip.toDestination} + ' | Departs ' + ${#temporals.format(trip.departureTime,'dd MMM HH:mm')}">Trip</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('add-fare-modal')"
              sec:authorize="hasAnyRole('STAGE_HEAD','TENANT_ADMIN','SUPER_ADMIN')">+ Add Fare Window</button>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>

    <div class="card" style="margin-bottom:1.5rem;">
      <div class="card-header"><span class="card-title">Active Fare Windows</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Effective From</th>
              <th>Effective To</th>
              <th>Price / Seat</th>
              <th>Created By</th>
            </tr>
          </thead>
          <tbody th:if="${not #lists.isEmpty(fares)}">
            <tr th:each="f : ${fares}">
              <td class="mono" style="font-size:0.8rem;" th:text="${#temporals.format(f.effectiveFrom,'dd MMM yyyy HH:mm')}">–</td>
              <td class="mono" style="font-size:0.8rem;" th:text="${f.effectiveTo != null ? #temporals.format(f.effectiveTo,'dd MMM yyyy HH:mm') : 'Open-ended'}">–</td>
              <td class="mono" style="color:var(--accent);" th:text="'KES ' + ${#numbers.formatDecimal(f.pricePerSeat,1,'COMMA',0,'POINT')}">–</td>
              <td style="font-size:0.8rem;color:var(--text-muted);" th:text="${f.createdBy ?: '–'}">–</td>
            </tr>
          </tbody>
          <tbody th:if="${#lists.isEmpty(fares)}">
            <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--text-muted);">No fare windows defined – base price applies</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div style="text-align:center;">
      <a th:href="@{/trips}" class="btn btn-ghost">← Back to Trips</a>
    </div>
  </div>
</main>

<!-- Add Fare Modal -->
<div id="add-fare-modal" class="modal-backdrop" sec:authorize="hasAnyRole('STAGE_HEAD','TENANT_ADMIN','SUPER_ADMIN')">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Fare Window</h2>
      <button class="modal-close" onclick="closeModal('add-fare-modal')">✕</button>
    </div>
    <form th:action="@{/tenant/trips/{id}/fares(id=${trip.id})}" method="post">
      <div class="form-group">
        <label class="form-label">Effective From</label>
        <input class="form-control" type="datetime-local" name="effectiveFrom" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Effective To <span style="color:var(--text-muted);font-size:0.75rem;">(leave blank for open-ended)</span></label>
        <input class="form-control" type="datetime-local" name="effectiveTo"/>
      </div>
      <div class="form-group">
        <label class="form-label">Price per Seat (KES)</label>
        <input class="form-control" type="number" name="price" step="0.01" placeholder="200.00" required/>
      </div>
      <div style="display:flex;gap:0.75rem;justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" onclick="closeModal('add-fare-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Fare Window</button>
      </div>
    </form>
  </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
