<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Admin • Users')}"></head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>

<main class="page">
  <div class="wrapper">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem;">Administration</div>
        <h1>Users</h1>
      </div>
      <a class="btn btn-primary" href="#" sec:authorize="hasRole('SUPER_ADMIN')" onclick="openModal('create-user-modal')">+ New User</a>
    </div>

    <div id="flash" class="alert" style="display:none;"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Role</th>
            <th>Tenant</th>
            <th>Stage</th>
            <th>Created</th>
          </tr>
          </thead>
          <tbody>
          <tr>
            <td class="mono">–</td>
            <td>Placeholder</td>
            <td class="mono">–</td>
            <td class="mono">–</td>
            <td class="mono">–</td>
            <td class="mono">–</td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div style="margin-top:1rem;color:var(--text-muted);font-size:0.85rem;">
      This is a placeholder view. Wire to <code>/api/admin/users</code> when available.
    </div>
  </div>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
