<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Offline')}"></head>
<body>
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;">
  <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" style="margin-bottom:2rem;opacity:0.6;">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>
  <h1 style="margin-bottom:1rem;">You're offline</h1>
  <p style="color:var(--text-muted);max-width:360px;margin-bottom:2rem;">
    No internet connection. Previously loaded pages are available from cache.
    Connect to the internet to book tickets or check live data.
  </p>
  <button class="btn btn-primary" onclick="window.location.reload()">Try Again</button>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
