<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, content)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#f97316"/>
  <meta name="description" content="TransitFlow – Transport Ticketing Management"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title th:replace="${pageTitle}">TransitFlow</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Transit<span>Flow</span></div>
      <div class="tagline">Ticketing System v4.0</div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a class="nav-item" href="/dashboard">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </a>

      <div class="nav-section-label">Ticketing</div>
      <a class="nav-item" href="/tickets/book">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
        </svg>
        Book Ticket
      </a>
      <a class="nav-item" href="/tickets">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        All Bookings
      </a>

      <div class="nav-section-label">Operations</div>
      <a class="nav-item" href="/trips">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
          <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2 2h9l2-2z"/><path d="M15 9h5l3 3v5h-8V9z"/>
        </svg>
        Trips
      </a>
      <a class="nav-item" href="/stages">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
          <path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Stages
      </a>
      <a class="nav-item" href="/vehicles">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/>
          <circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
        Vehicles
      </a>

      <!-- Admin-only section -->
      <div sec:authorize="hasRole('SUPER_ADMIN') or hasRole('TENANT_ADMIN')">
        <div class="nav-section-label">Admin</div>
        <a class="nav-item" href="/admin/tenants" sec:authorize="hasRole('SUPER_ADMIN')">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0H5m14 0h2M5 21H3"/>
          </svg>
          Tenants
        </a>
        <a class="nav-item" href="/admin/users">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
          </svg>
          Users
        </a>
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="user-badge">
        <div class="user-avatar" sec:authentication="name" th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}">SA</div>
        <div class="user-info">
          <div class="user-name" sec:authentication="name">User</div>
          <div class="user-role" sec:authorize="hasRole('SUPER_ADMIN')">Super Admin</div>
          <div class="user-role" sec:authorize="hasRole('TENANT_ADMIN')">Tenant Admin</div>
          <div class="user-role" sec:authorize="hasRole('STAGE_HEAD')">Stage Head</div>
          <div class="user-role" sec:authorize="hasRole('STAGE_ATTENDANT')">Attendant</div>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-ghost btn-sm w-full mt-8" style="justify-content:center">Sign Out</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <span class="topbar-title" th:replace="${pageTitle}">Page</span>
      </div>
      <div class="topbar-actions">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--text3)" id="online-status">● ONLINE</div>
      </div>
    </header>

    <div class="page-content">
      <th:block th:replace="${content}"/>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/app.js"></script>
<script>
  // Online/offline indicator
  function updateOnlineStatus() {
    const el = document.getElementById('online-status');
    if (el) {
      el.textContent = navigator.onLine ? '● ONLINE' : '○ OFFLINE';
      el.style.color = navigator.onLine ? 'var(--green)' : 'var(--red)';
    }
  }
  window.addEventListener('online',  updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();
</script>
</body>
</html>
