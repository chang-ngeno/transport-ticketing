<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#f0a500"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="TransitPass"/>
  <title th:text="${title} + ' – TransitPass'">TransitPass</title>
  <link rel="manifest" th:href="@{/manifest.json}"/>
  <link rel="icon" type="image/svg+xml" th:href="@{/icons/icon-192.png.svg}"/>
  <link rel="apple-touch-icon" th:href="@{/icons/icon-192.png.svg}"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
</head>
</html>
